<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PostForge Target Architecture</title>
  <style>
    :root {
      --bg: #111111;
      --line: #d7d7d7;
      --muted: #a7a7a7;
      --green: #22c55e;
      --blue: #38bdf8;
      --red: #ef4444;
      --yellow: #facc15;
      --spring: #6db33f;
      --orange: #f97316;
      --postgres: #5ca6d1;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    svg {
      width: 100vw;
      height: auto;
      display: block;
      background: var(--bg);
      font-family: "Comic Sans MS", "Segoe Print", "Bradley Hand", ui-monospace, monospace;
    }

    .box {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
    }

    .thin {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.35;
      vector-effect: non-scaling-stroke;
    }

    .wg {
      fill: none;
      stroke-width: 1.5;
      vector-effect: non-scaling-stroke;
    }

    .green { stroke: var(--green); }
    .blue { stroke: var(--blue); }
    .red { stroke: var(--red); }
    .yellow { stroke: var(--yellow); }

    .label {
      fill: var(--line);
      font-size: 16px;
    }

    .small {
      fill: var(--line);
      font-size: 13px;
    }

    .tiny {
      fill: var(--line);
      font-size: 11px;
    }

    .muted {
      fill: var(--muted);
    }

    .flow {
      fill: rgba(255, 255, 255, 0.02);
      stroke: var(--line);
      stroke-width: 1.4;
      vector-effect: non-scaling-stroke;
    }

    .arrow {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#arrow);
      vector-effect: non-scaling-stroke;
    }

    .wire {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.55;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
  </style>
</head>
