app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  oauth2:
    redirect-url: ${APP_OAUTH2_REDIRECT_URL}
  email:
    verification-base-url: ${APP_EMAIL_VERIFICATION_BASE_URL}

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
    #    hibernate:
    #      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: https://api.iamrat.dev/login/oauth2/code/google
            scope: profile, email
          naver:
            authorization-grant-type: authorization_code
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: https://api.iamrat.dev/login/oauth2/code/naver
            scope: name, email, nickname
            client-authentication-method: client_secret_post
          kakao:
            authorization-grant-type: authorization_code
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: https://api.iamrat.dev/login/oauth2/code/kakao
            scope: profile_nickname, account_email
            client-authentication-method: client_secret_post
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

internal:
  api-key: ${INTERNAL_API_KEY}

collector:
  naver-news:
    client-id: ${NAVER_NEWS_CLIENT_ID:}
    client-secret: ${NAVER_NEWS_CLIENT_SECRET:}
    keywords: ${NAVER_NEWS_KEYWORDS:AI,테크,스타트업,정책}
    display: ${NAVER_NEWS_DISPLAY:10}
    cron: ${NAVER_NEWS_CRON:0 0 */2 * * *}

auth:
  login:
    protection:
      enabled: true
      rate-limit-window-seconds: 60
      user-limit-per-window: 10
      ip-limit-per-window: 30
      failure-window-seconds: 300
      failure-limit: 5
      lock-seconds: 300

jwt:
  secret: ${JWT_SECRET}
  accessTokenValidity: 15
  refreshTokenValidity: 7

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      access: read-only

monitoring:
  username: ${MONITORING_USERNAME}
  password: ${MONITORING_PASSWORD}

logging:
  level:
    org.springframework.security: ${LOG_LEVEL_SPRING_SECURITY:INFO}
    org.springframework.security.oauth2: ${LOG_LEVEL_SPRING_SECURITY_OAUTH2:INFO}
    dev.iamrat: ${LOG_LEVEL_APP:INFO}

aws:
  s3:
    bucket: ${AWS_BUCKET}
    region: ${AWS_REGION}
