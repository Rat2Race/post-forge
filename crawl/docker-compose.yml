services:
  crawl:
    build: .
    container_name: postforge-crawl
    ports:
      - "8090:8090"
    volumes:
      - crawl-data:/app/data
    environment:
      - NAVER_NEWS_CLIENT_ID=${NAVER_NEWS_CLIENT_ID}
      - NAVER_NEWS_CLIENT_SECRET=${NAVER_NEWS_CLIENT_SECRET}
      - DART_API_KEY=${DART_API_KEY}
      - AI_API_BASE_URL=${AI_API_BASE_URL}
    restart: unless-stopped

volumes:
  crawl-data:
