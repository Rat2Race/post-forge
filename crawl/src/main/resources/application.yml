server:
  port: 8090

spring:
  application:
    name: crawl

  datasource:
    url: jdbc:h2:file:./data/crawl
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: ${CRAWL_H2_CONSOLE_ENABLED:false}
      path: /h2-console

crawl:
  naver-news:
    client-id: ${NAVER_NEWS_CLIENT_ID}
    client-secret: ${NAVER_NEWS_CLIENT_SECRET}
    keywords: "AI,테크,스타트업,정책"
    display: 10
    cron: "0 0 */2 * * *"

internal:
  api:
    base-url: ${INTERNAL_API_BASE_URL:http://localhost:8080}
    key: ${INTERNAL_API_KEY}
