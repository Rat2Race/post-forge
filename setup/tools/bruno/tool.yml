schemaVersion: 1
id: bruno
name: Bruno
type: api-client
purpose: Manual API exploration and future smoke/scenario harnesses.

commands:
  install: setup/tools/bruno/install.sh
  verify: setup/tools/bruno/verify.sh

versioning:
  strategy: npm-global
  package: "@usebruno/cli"
  defaultVersion: latest
  overrideEnv: BRUNO_CLI_VERSION

risk:
  level: medium
  reason: Installs a global npm package when Bruno CLI is missing.

outputs:
  - tests/bruno/AGENTS.md
  - tests/bruno/api
  - tests/bruno/api/generated
  - tests/bruno/api/manual
